name: Publint

on:
  push:
  pull_request:

jobs:
  publint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Set Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - run: pnpm install --no-frozen-lockfile
      - run: pnpm build
      - run: pnpm dlx publint run . --pack pnpm --strict
